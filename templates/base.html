<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Apartment Item Exchange{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            color: #2c3e50;
        }
        .brand {
            font-weight: 600;
            color: #2c3e50;
            text-decoration: none;
        }
        .brand:hover { color: #1a252f; }
        .card-soft {
            border: none;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .btn-brand {
            background: #2c3e50;
            border-color: #2c3e50;
            color: #fff;
        }
        .btn-brand:hover,
        .btn-brand:focus {
            background: #1a252f;
            border-color: #1a252f;
            color: #fff;
        }
        .form-control:focus {
            border-color: #2c3e50;
            box-shadow: 0 0 0 0.2rem rgba(44, 62, 80, 0.15);
        }
        dt { font-weight: 500; color: #6c757d; }
        dd { margin-bottom: 0.5rem; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    {% if messages %}
        <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
            {% for message in messages %}
                <div class="toast show align-items-center text-bg-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% elif message.tags == 'info' %}primary{% else %}secondary{% endif %} border-0 mb-2" role="alert">
                    <div class="d-flex">
                        <div class="toast-body">{{ message }}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
